<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件预览 - Amo系统</title>
  <link rel="stylesheet" href="css/preview.css">
</head>
<body>
  <!-- Loading -->
  <div id="loading-overlay">
    <div class="loading-spinner">
      <div class="spinner"></div>
      <div class="loading-text" id="loading-text">正在加载文件...</div>
      <div class="loading-progress" id="loading-progress"></div>
    </div>
  </div>

  <!-- Error -->
  <div id="error-overlay" style="display:none">
    <div class="error-content">
      <div class="error-icon">⚠️</div>
      <div class="error-title">加载失败</div>
      <div class="error-msg" id="error-msg"></div>
      <button class="btn-primary" onclick="location.reload()">重新加载</button>
    </div>
  </div>

  <!-- Toolbar -->
  <div id="toolbar" style="display:none">
    <div class="toolbar-left">
      <button class="toolbar-btn" onclick="Preview.toggleOutline()" title="目录" id="outline-toggle-btn">📑</button>
      <span class="toolbar-title" id="toolbar-title">文件预览</span>
    </div>
    <div class="toolbar-center" id="toolbar-center"></div>
    <div class="toolbar-right">
      <button class="toolbar-btn" onclick="Preview.download()" title="下载">📥</button>
      <button class="toolbar-btn" onclick="Preview.close()" title="关闭">✕</button>
    </div>
  </div>

  <!-- PDF Zoom Bar -->
  <div id="pdf-zoombar" style="display:none">
    <button class="zoom-btn" onclick="Preview.zoomOut()" title="缩小">−</button>
    <span class="zoom-level" id="zoom-level">100%</span>
    <button class="zoom-btn" onclick="Preview.zoomIn()" title="放大">+</button>
    <button class="zoom-btn" onclick="Preview.zoomFit()" title="适应宽度" style="margin-left:4px">↔ 适应宽度</button>
  </div>

  <!-- PDF Outline Sidebar -->
  <div id="pdf-outline" style="display:none">
    <div class="outline-header">
      <span>📑 目录</span>
      <button class="outline-close" onclick="Preview.toggleOutline()">✕</button>
    </div>
    <div class="outline-list" id="outline-list"></div>
  </div>

  <!-- PDF Viewer -->
  <div id="pdf-viewer" style="display:none"></div>

  <!-- Page Indicator -->
  <div id="pdf-page-indicator" style="display:none">
    <span id="page-indicator-text">第 1 页 / 共 1 页</span>
  </div>

  <!-- 3D Viewer -->
  <div id="model-viewer" style="display:none">
    <canvas id="model-canvas"></canvas>
    <div id="model-controls" style="display:none">
      <button class="model-btn" onclick="Preview.resetCamera()" title="重置视角">🔄 重置</button>
      <button class="model-btn" onclick="Preview.toggleWireframe()" title="线框/实体" id="wireframe-btn">🔲 线框</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="js/preview.js"></script>
</body>
</html>
