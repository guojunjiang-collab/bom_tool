<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOM管理系统</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/pages.css">
</head>
<body>
<div id="login-page">
  <div class="login-card">
    <h1>🏗️ BOM管理系统</h1>
    <p class="sub">物料清单全生命周期数字化管理平台</p>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="login-user" placeholder="请输入用户名" autocomplete="off">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="login-pass" placeholder="请输入密码">
    </div>
    <button class="btn-login" id="login-btn">登 录</button>
    <div class="demo-hint">
      演示账号：admin / admin123（管理员）<br>
      engineer / eng123（工程师）｜ guest / guest123（访客）
    </div>
  </div>
</div>

<div id="app" style="display:none">
  <aside id="sidebar">
    <div class="sidebar-header">🏗️ BOM管理</div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <a data-page="dashboard" class="active"><span class="nav-icon">📊</span><span>仪表盘</span></a>
      <a data-page="parts"><span class="nav-icon">🔧</span><span>零件管理</span></a>
      <a data-page="components"><span class="nav-icon">📦</span><span>部件管理</span></a>
      <a data-page="bom"><span class="nav-icon">📋</span><span>BOM管理</span></a>
      <a data-page="users" data-roles="admin"><span class="nav-icon">👥</span><span>用户管理</span></a>
      <a data-page="logs" data-roles="admin"><span class="nav-icon">📝</span><span>操作日志</span></a>
      <a data-page="settings" data-roles="admin"><span class="nav-icon">⚙️</span><span>系统设置</span></a>
    </nav>
    <div class="sidebar-footer">v1.0 · BOM管理系统</div>
  </aside>
  <div class="main-wrapper">
    <header id="topbar">
      <div class="left"><span class="breadcrumb" id="breadcrumb">仪表盘</span></div>
      <div class="right">
        <span id="sync-indicator" title="同步状态" style="font-size:11px;color:var(--text-light);margin-right:8px"></span>
        <button class="btn-outline" id="pull-btn" title="从服务器拉取数据">🔄 检出数据</button>
        <button class="btn-outline" id="clear-cache-btn" title="清除本地缓存数据，下次同步时从服务器重新拉取" style="margin-left:4px">🗑️ 清除缓存</button>
        <span class="user-badge" id="user-badge">管理员</span>
        <button class="btn-outline" id="logout-btn">退出登录</button>
      </div>
    </header>
    <div id="content"></div>
  </div>
</div>

<div id="modal-overlay" style="display:none">
  <div id="modal-box">
    <div id="modal-header"><h3 id="modal-title"></h3><button id="modal-close">×</button></div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="toast-container"></div>

<!-- 同步进度模态框 -->
<div id="sync-modal" class="sync-modal-overlay">
  <div class="sync-modal">
    <div class="sync-modal-header">
      <h3>🔄 从服务器检出数据</h3>
      <button class="close-btn" id="sync-modal-close">×</button>
    </div>
    <div class="sync-modal-body">
      <div class="sync-progress">
        <div class="sync-progress-bar">
          <div class="sync-progress-fill" id="sync-progress-fill" style="width:0%"></div>
        </div>
        <div class="sync-progress-info">
          <span id="sync-progress-text">准备同步...</span>
          <span class="percentage" id="sync-progress-percent">0%</span>
        </div>
      </div>
      <div class="sync-status" id="sync-status">
        正在连接服务器...
      </div>
      <div class="sync-results" id="sync-results" style="display:none">
        <div class="result-item"><span class="result-label">零件</span><span class="result-value" id="result-parts">-</span></div>
        <div class="result-item"><span class="result-label">部件</span><span class="result-value" id="result-components">-</span></div>
        <div class="result-item"><span class="result-label">用户</span><span class="result-value" id="result-users">-</span></div>
        <div class="result-item"><span class="result-label">材质字典</span><span class="value" id="result-dict_materials">-</span></div>
      </div>
    </div>
    <div class="sync-modal-footer">
      <button class="btn-cancel" id="sync-cancel-btn">取消</button>
    </div>
  </div>
</div>

<!-- 同步队列面板 -->
<div id="sync-panel" class="sync-panel">
  <div class="panel-header" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #f0f0f0;cursor:move;background:#fafafa;border-radius:8px 8px 0 0">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:14px;font-weight:600">数据检出队列</span>
      <span class="sync-badge" id="sync-panel-badge" style="font-size:11px;padding:2px 6px;border-radius:10px;background:#1890ff;color:#fff">0待处理</span>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-icon" id="sync-panel-toggle" title="最小化">−</button>
      <button class="btn-icon" id="sync-panel-close" title="关闭">×</button>
    </div>
  </div>
  <div id="sync-panel-content">
    <div class="sync-stats-row">
      <div class="sync-stat-item">
        <div class="stat-value" id="sync-stat-pending" style="color:#1890ff">0</div>
        <div class="stat-label">待处理</div>
      </div>
      <div class="sync-stat-item">
        <div class="stat-value" id="sync-stat-uploading" style="color:#fa8c16">0</div>
        <div class="stat-label">进行中</div>
      </div>
      <div class="sync-stat-item">
        <div class="stat-value" id="sync-stat-success" style="color:#52c41a">0</div>
        <div class="stat-label">成功</div>
      </div>
      <div class="sync-stat-item">
        <div class="stat-value" id="sync-stat-error" style="color:#ff4d4f">0</div>
        <div class="stat-label">失败</div>
      </div>
    </div>
    <div class="current-task" id="sync-current-task" style="display:none">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:13px;font-weight:500" id="sync-task-title">正在上传：零件 P-0012</span>
        <span style="font-size:12px;color:#1890ff" id="sync-task-progress">65%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="sync-progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="queue-list" id="sync-queue-list">
      <!-- 队列项会动态插入 -->
    </div>
    <div class="panel-footer">
      <div style="display:flex;gap:8px">
        <button class="btn-text" id="sync-clear-completed" style="font-size:12px;color:#666">清除已完成</button>
        <button class="btn-text" id="sync-retry-failed" style="font-size:12px;color:#ff4d4f">重试失败</button>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-outline" id="sync-pause-btn" style="font-size:12px;padding:4px 12px">暂停</button>
        <button class="btn-primary" id="sync-force-sync" style="font-size:12px;padding:4px 12px">立即同步</button>
      </div>
    </div>
  </div>
</div>


  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/pages-dashboard.js"></script>
  <script src="js/pages-logs.js"></script>
  <script src="js/pages-parts.js"></script>
  <script src="js/pages-components.js"></script>
  <script src="js/pages-bom.js"></script>
  <script src="js/pages-users.js"></script>
  <script src="js/pages-settings.js"></script>
  <script src="js/router.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/sync-manager.js"></script>
  <script src="js/sync-panel.js"></script>
  <script src="js/init.js"></script>

</body>
</html>
